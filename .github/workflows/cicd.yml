name: CICD

on: [push]

permissions:
  contents: read

concurrency:
  # Only one side branch run at a time. Every commit runs in parallel on main and staging branch
  group: ${{ github.workflow }}-${{ github.ref }}-${{ contains(fromJSON('["refs/heads/main", "refs/heads/staging"]'), github.ref) && github.sha || '' }}
  cancel-in-progress: true

jobs:
  workspace-vars:
    name: Workspace vars
    runs-on: gh-actions-small-runner-set
    outputs:
      assets-dir: src/assets
      build-dir: build
      build-artifact-name: build
      bucket-path: web-app
      node-version: 18
    steps:
      - name: Workspace vars
        run: echo "empty step"

  install-dependencies:
    name: Install dependencies
    needs: workspace-vars
    runs-on: gh-actions-large-runner-set
    outputs:
      cache-key: ${{ env.CACHE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        id: install-dependencies
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}
          npm-token: ${{ secrets.GH_READ_PACKAGES_TOKEN }}

  quality-check:
    name: Quality check
    needs:
      - workspace-vars
      - install-dependencies
    uses: ./.github/workflows/quality-check.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}

  build-smoke-test:
    name: Build smoke test
    if: github.ref != 'refs/heads/staging' && github.ref != 'refs/heads/main'
    needs:
      - workspace-vars
      - install-dependencies
    uses: ./.github/workflows/build.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      assets-url: https://gorgias-assets.gorgias.xyz/preview/${{ github.sha }}/${{ needs.workspace-vars.outputs.bucket-path }}}
      release: smoke-test-${{ github.sha }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: ${{ needs.workspace-vars.outputs.build-artifact-name }}

  build-staging:
    name: Build staging
    if: github.ref == 'refs/heads/staging'
    needs:
      - workspace-vars
      - install-dependencies
    uses: ./.github/workflows/build.yml
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      assets-url: https://gorgias-assets.gorgias.xyz/preview/${{ github.sha }}/${{ needs.workspace-vars.outputs.bucket-path }}}
      release: staging-${{ github.sha }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: ${{ needs.workspace-vars.outputs.build-artifact-name }}

  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/staging'
    needs:
      - workspace-vars
      - install-dependencies
      - quality-check
      - build-staging
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.install-dependencies.outputs.cache-key}}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      gcloud-project: gorgias-helpdesk-staging
      kube-context: gorgias-helpdesk-staging-us-east1-86cc
      bucket: gs://gorgias-assets-staging
      bucket-path: ${{ needs.workspace-vars.outputs.bucket-path }}
      assets-dir: ${{ needs.workspace-vars.outputs.assets-dir }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: ${{ needs.workspace-vars.outputs.build-artifact-name }}
      sentry-project: helpdesk-staging
      release: staging-${{ github.sha }}

  Chromatic:
    name: Upload Chromatic
    needs:
      - workspace-vars
      - install-dependencies
      - quality-check
    runs-on: gh-actions-small-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore cache
        uses: actions/cache@v4
        with:
          key: ${{ needs.install-dependencies.outputs.cache-key }}
          path: node_modules

      - name: Install node
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}

      - name: Upload Chromatic
        run: yarn chromatic --zip --exit-once-uploaded --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
