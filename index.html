<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototypes — Inês Parreira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: #e8e8ec;
  --text: #111116;
  --text-2: #6b6b80;
  --text-3: #9898a8;
  --accent: #6355e8;
  --accent-dim: rgba(99,85,232,0.06);
  --accent-border: rgba(99,85,232,0.18);
  --r: 16px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'cv02','cv03','cv04','cv11','ss01';
  -webkit-font-smoothing: antialiased;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  letter-spacing: -0.01em;
}

.container { max-width: 720px; margin: 0 auto; padding: 80px 24px 120px; }
header { margin-bottom: 64px; }
header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 8px; }
.prototypes { display: flex; flex-direction: column; gap: 16px; }
.proto-card { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 28px 28px 24px; text-decoration: none; color: inherit; transition: border-color 0.2s, box-shadow 0.2s; }
.proto-card:hover { border-color: var(--accent-border); box-shadow: 0 2px 12px rgba(99,85,232,0.06); }
.proto-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.proto-tag { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
.proto-date { font-size: 12px; color: var(--text-3); }
.proto-card h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
.proto-card p { color: var(--text-2); font-size: 14px; line-height: 1.55; }
.proto-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--accent); margin-top: 18px; }
.proto-link svg { transition: transform 0.15s; }
.proto-card:hover .proto-link svg { transform: translateX(3px); }
footer { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-3); display: flex; align-items: center; justify-content: space-between; }
footer a { color: var(--text-2); text-decoration: none; }
footer a:hover { color: var(--text); }
@media (max-width: 520px) { .container { padding: 48px 18px 80px; } header h1 { font-size: 24px; } .proto-card { padding: 20px; } }
</style>
</head>
<body>
<div class="container">
  <header><h1>Inês' Prototype Library</h1></header>
  <div class="prototypes">
    <a class="proto-card" href="daily-digest/index.html">
      <div class="proto-meta">
      </div>
      <h2>Vision – Daily digest</h2>
      <p>What’s next when automation rate is 80%+?</p>
      <div class="proto-link">View prototype <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
    <a class="proto-card" href="copilot-ui-patterns/index.html">
      <div class="proto-meta">
      </div>
      <h2>Copilot UI patterns</h2>
      <p>UI patterns for copilot</p>
      <div class="proto-link">View prototype <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
  </div>
  <footer>
    <span>Inês Parreira</span>
    <a href="https://github.com/ines-parreira/prototypes">2026</a>
  </footer>
</div>
</body>
</html>
