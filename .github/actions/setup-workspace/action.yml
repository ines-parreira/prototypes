name: Setup workspace
description: Sets up Node.js, pnpm, cache, and installs dependencies

inputs:
  node-version:
    description: Node.js version to install
    required: true
  cache-key:
    description: Cache key for pnpm store
    required: true
  npm-token:
    description: NPM token for private packages
    required: false

runs:
  using: composite
  steps:
    - name: Install node
      uses: gorgias/reusable-actions/.github/actions/setup-node@main
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get pnpm store directory
      shell: bash
      id: pnpm-cache
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v4
      id: cache
      with:
        key: ${{ inputs.cache-key }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}

    - name: Set GitHub Packages auth token
      if: inputs.npm-token != ''
      shell: bash
      run: |
        echo '@gorgias:registry=https://npm.pkg.github.com/' >> .npmrc
        echo '//npm.pkg.github.com/:_authToken=${{ inputs.npm-token }}' >> .npmrc

    - name: Install dependencies
      shell: bash
      run: pnpm install