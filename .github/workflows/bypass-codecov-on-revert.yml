name: Bypass Codecov on revert

on:
  pull_request:
    types: [opened, synchronize]

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  bypass-codecov-on-revert:
    runs-on: gh-actions-small-runner-set
    permissions:
      statuses: write

    steps:
      - name: Check if the source branch is a revert branch
        id: check_revert_branch
        run: |
          if [[ "${{ github.head_ref }}" == revert/* || "${{ github.head_ref }}" == revert-* ]]; then
            echo "IsRevert=true" >> $GITHUB_ENV
          else
            echo "IsRevert=false" >> $GITHUB_ENV
          fi

      - name: Install GH command-line tool
        if: env.IsRevert == 'true'
        run: |
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
            && sudo mkdir -p -m 755 /etc/apt/keyrings \
            && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
            && sudo apt update \
            && sudo apt install gh -y

      - name: Set Codecov status checks to success if revert branch
        if: env.IsRevert == 'true'
        run: |
          gh api -X POST \
            repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="codecov/patch" \
            -f description="Revert branch detected, skipping check."
          gh api -X POST \
            repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="codecov/project" \
            -f description="Revert branch detected, skipping check."
