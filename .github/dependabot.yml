# Config options: https://docs.github.com/en/code-security/supply-chain-security/configuration-options-for-dependency-updates
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip-compile"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
