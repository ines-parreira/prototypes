name: CICD

on: [push]

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  # Only one side branch run at a time. Every commit runs in parallel on main and staging branch
  group: ${{ github.workflow }}-${{ github.ref }}-${{ contains(fromJSON('["refs/heads/main", "refs/heads/staging"]'), github.ref) && github.sha || '' }}
  cancel-in-progress: true

jobs:
  workspace-vars:
    name: Workspace vars
    runs-on: gh-actions-small-runner-set
    outputs:
      assets-dir: apps/helpdesk/src/assets
      build-dir: apps/helpdesk/build
      bucket-path: web-app
      node-version: "22.22.0"
      react-doctor-gcloud-project: gorgias-helpdesk-staging
      react-doctor-gcs-bucket: gs://gorgias-assets-staging/react-doctor-reports/helpdesk-web-app
    steps:
      - name: Workspace vars
        run: echo "empty step"

  workspace-setup:
    name: Workspace setup
    needs: workspace-vars
    runs-on: gh-actions-large-runner-set
    outputs:
      cache-key: ${{ env.CACHE_KEY }}
      helpdesk-affected: ${{ env.HELPDESK_AFFECTED }}
      has-other-affected-packages: ${{ env.HAS_OTHER_AFFECTED_PACKAGES }}
      other-affected-packages: ${{ env.OTHER_AFFECTED_PACKAGES }}
      other-unaffected-packages: ${{ env.OTHER_UNAFFECTED_PACKAGES }}
      has-react-doctor-affected-packages: ${{ env.HAS_REACT_DOCTOR_AFFECTED_PACKAGES }}
      react-doctor-affected-packages: ${{ env.REACT_DOCTOR_AFFECTED_PACKAGES }}
      nx-base-commit: ${{ env.NX_BASE_COMMIT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        id: install-dependencies
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}
          npm-token: ${{ secrets.GH_READ_PACKAGES_TOKEN }}

      - name: Get affected packages
        id: get-affected-packages
        run: |
          # Determine the base commit for affected detection
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # On main branch, compare against the previous commit
            NX_BASE_COMMIT="HEAD~1"
            echo "On main branch, using base commit: $NX_BASE_COMMIT"
          else
            # On feature branches, compare against origin/main
            NX_BASE_COMMIT="origin/main"
            echo "On feature branch, using base commit: $NX_BASE_COMMIT"
          fi
          echo "NX_BASE_COMMIT=$NX_BASE_COMMIT" >> $GITHUB_ENV

          # Check if @repo/helpdesk is affected
          HELPDESK_AFFECTED_JSON=$(npx nx show projects --affected --projects=@repo/helpdesk --json --base=$NX_BASE_COMMIT --head=HEAD)
          if echo "$HELPDESK_AFFECTED_JSON" | jq -e '. | length > 0' > /dev/null; then
            echo "HELPDESK_AFFECTED=true" >> $GITHUB_ENV
            echo "@repo/helpdesk is affected"
          else
            echo "HELPDESK_AFFECTED=false" >> $GITHUB_ENV
            echo "@repo/helpdesk is not affected"
          fi

          # Get other affected packages that have a test target, excluding helpdesk
          OTHER_AFFECTED_PACKAGES_JSON=$(npx nx show projects --affected --with-target=test --exclude=@repo/helpdesk --json --base=$NX_BASE_COMMIT --head=HEAD)

          # Check if there are any other affected packages
          if echo "$OTHER_AFFECTED_PACKAGES_JSON" | jq -e '. | length > 0' > /dev/null; then
            # Convert the JSON array to a format suitable for GitHub Actions matrix
            OTHER_AFFECTED_PACKAGES_MATRIX=$(echo "$OTHER_AFFECTED_PACKAGES_JSON" | jq -c 'map({project: .})')
            echo "OTHER_AFFECTED_PACKAGES=$OTHER_AFFECTED_PACKAGES_MATRIX" >> $GITHUB_ENV
            echo "HAS_OTHER_AFFECTED_PACKAGES=true" >> $GITHUB_ENV
            echo "Found other affected packages: $OTHER_AFFECTED_PACKAGES_JSON"
          else
            echo "OTHER_AFFECTED_PACKAGES=[]" >> $GITHUB_ENV
            echo "HAS_OTHER_AFFECTED_PACKAGES=false" >> $GITHUB_ENV
            echo "No other affected packages with test target found"
          fi

          # Get affected packages for React Doctor diagnostics
          REACT_DOCTOR_AFFECTED_PACKAGES_JSON=$(npx nx show projects --affected --with-target=lint --exclude=@repo/root --json --base=$NX_BASE_COMMIT --head=HEAD)

          if echo "$REACT_DOCTOR_AFFECTED_PACKAGES_JSON" | jq -e '. | length > 0' > /dev/null; then
            REACT_DOCTOR_AFFECTED_PACKAGES_MATRIX=$(echo "$REACT_DOCTOR_AFFECTED_PACKAGES_JSON" | jq -c 'map({project: ., alias: (sub("^@"; "") | gsub("/"; "-"))})')
            echo "REACT_DOCTOR_AFFECTED_PACKAGES=$REACT_DOCTOR_AFFECTED_PACKAGES_MATRIX" >> $GITHUB_ENV
            echo "HAS_REACT_DOCTOR_AFFECTED_PACKAGES=true" >> $GITHUB_ENV
            echo "Found affected packages for React Doctor: $REACT_DOCTOR_AFFECTED_PACKAGES_JSON"
          else
            echo "REACT_DOCTOR_AFFECTED_PACKAGES=[]" >> $GITHUB_ENV
            echo "HAS_REACT_DOCTOR_AFFECTED_PACKAGES=false" >> $GITHUB_ENV
            echo "No affected packages with lint target found for React Doctor"
          fi

          # Get all packages with test target (excluding helpdesk)
          ALL_PACKAGES_JSON=$(npx nx show projects --with-target=test --exclude=@repo/helpdesk --json)

          # Filter out the affected packages to get only unaffected ones
          if echo "$ALL_PACKAGES_JSON" | jq -e '. | length > 0' > /dev/null; then
            # Remove affected packages from the complete list
            OTHER_UNAFFECTED_PACKAGES_JSON=$(echo "$ALL_PACKAGES_JSON" "$OTHER_AFFECTED_PACKAGES_JSON" | jq -s '.[0] - .[1]')

            # Check if there are any unaffected packages
            if echo "$OTHER_UNAFFECTED_PACKAGES_JSON" | jq -e '. | length > 0' > /dev/null; then
              # Convert the JSON array to a format suitable for GitHub Actions matrix
              OTHER_UNAFFECTED_PACKAGES_MATRIX=$(echo "$OTHER_UNAFFECTED_PACKAGES_JSON" | jq -c 'map({project: .})')
              echo "OTHER_UNAFFECTED_PACKAGES=$OTHER_UNAFFECTED_PACKAGES_MATRIX" >> $GITHUB_ENV
              echo "Found other unaffected packages: $OTHER_UNAFFECTED_PACKAGES_JSON"
            else
              echo "OTHER_UNAFFECTED_PACKAGES=[]" >> $GITHUB_ENV
              echo "No other unaffected packages with test target found"
            fi
          else
            echo "OTHER_UNAFFECTED_PACKAGES=[]" >> $GITHUB_ENV
            echo "No packages with test target found"
          fi

  quality-check:
    name: Quality check
    needs:
      - workspace-vars
      - workspace-setup
    uses: ./.github/workflows/quality-check.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      helpdesk-affected: ${{ needs.workspace-setup.outputs.helpdesk-affected }}
      has-other-affected-packages: ${{ needs.workspace-setup.outputs.has-other-affected-packages }}
      other-affected-packages: ${{ needs.workspace-setup.outputs.other-affected-packages }}
      other-unaffected-packages: ${{ needs.workspace-setup.outputs.other-unaffected-packages }}
      has-react-doctor-affected-packages: ${{ needs.workspace-setup.outputs.has-react-doctor-affected-packages }}
      react-doctor-affected-packages: ${{ needs.workspace-setup.outputs.react-doctor-affected-packages }}
      react-doctor-gcloud-project: ${{ needs.workspace-vars.outputs.react-doctor-gcloud-project }}
      react-doctor-gcs-bucket: ${{ needs.workspace-vars.outputs.react-doctor-gcs-bucket }}
      nx-base-commit: ${{ needs.workspace-setup.outputs.nx-base-commit }}

  build-smoke-test:
    name: Build smoke test
    if: github.ref != 'refs/heads/staging' && github.ref != 'refs/heads/main'
    needs:
      - workspace-vars
      - workspace-setup
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      assets-url: https://gorgias-assets.gorgias.xyz/preview/${{ github.sha }}/${{ needs.workspace-vars.outputs.bucket-path }}
      release: smoke-test-${{ github.sha }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: smoke-test-build

  build-staging:
    name: Build staging
    if: github.ref == 'refs/heads/staging'
    needs:
      - workspace-vars
      - workspace-setup
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      assets-url: https://gorgias-assets.gorgias.xyz/${{ needs.workspace-vars.outputs.bucket-path }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: staging-build
      release: staging-${{ github.sha }}

  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/staging'
    needs:
      - workspace-vars
      - workspace-setup
      - build-staging
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key}}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      gcloud-project: gorgias-helpdesk-staging
      bucket: gs://gorgias-assets-staging
      clusters: gorgias-helpdesk-staging-us-east1-86cc
      bucket-path: ${{ needs.workspace-vars.outputs.bucket-path }}
      assets-dir: ${{ needs.workspace-vars.outputs.assets-dir }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: staging-build
      sentry-project: helpdesk-staging
      release: staging-${{ github.sha }}

  build-docker-image:
    name: Build docker image
    uses: gorgias/reusable-actions/.github/workflows/image-build.yml@main
    with:
      image-names: us-east1-docker.pkg.dev/gorgias-helpdesk-staging/container-images/web-app
      docker-file-path: deployment/docker/Dockerfile
      build-args: RELEASE=${{ github.sha }}
    secrets: inherit

  build-production:
    name: Build production
    if: github.ref == 'refs/heads/main'
    needs:
      - workspace-vars
      - workspace-setup
    uses: ./.github/workflows/build.yml
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key }}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      assets-url: https://gorgias-assets.gorgias.io/${{ needs.workspace-vars.outputs.bucket-path }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: production-build
      release: production-${{ github.sha }}

  deploy-production:
    name: Deploy production
    if: github.ref == 'refs/heads/main'
    needs:
      - workspace-vars
      - workspace-setup
      - quality-check
      - build-production
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      cache-key: ${{ needs.workspace-setup.outputs.cache-key}}
      node-version: ${{ needs.workspace-vars.outputs.node-version }}
      bucket: gs://gorgias-assets-production
      gcloud-project: gorgias-helpdesk-production
      clusters: >-
        gorgias-helpdesk-production-aus-southeast1-fcb9
        gorgias-helpdesk-production-europe-west1-c511
        gorgias-helpdesk-production-europe-west3-86c1
        gorgias-helpdesk-production-us-central1-c433
        gorgias-helpdesk-production-us-central1-d8ff
        gorgias-helpdesk-production-us-east1-2607
        gorgias-helpdesk-production-us-east1-c94b
        gorgias-helpdesk-production-us-east4-5f09
        gorgias-helpdesk-production-us-east4-65cd
        gorgias-helpdesk-production-europe-west4-e7f4
        gorgias-main-us-east1-635c
      bucket-path: ${{ needs.workspace-vars.outputs.bucket-path }}
      assets-dir: ${{ needs.workspace-vars.outputs.assets-dir }}
      build-dir: ${{ needs.workspace-vars.outputs.build-dir }}
      artifact: production-build
      sentry-project: helpdesk-web-app
      release: production-${{ github.sha }}

  Chromatic:
    name: Upload Chromatic
    needs:
      - workspace-vars
      - workspace-setup
      - quality-check
    runs-on: gh-actions-default-runner-set

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}
          cache-key: ${{ needs.workspace-setup.outputs.cache-key }}
          npm-token: ${{ secrets.GH_READ_PACKAGES_TOKEN }}

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/helpdesk
          buildScriptName: "storybook:build"
          exitOnceUploaded: true
          autoAcceptChanges: "main"
          onlyChanged: true
          zip: true

  security-sast:
    name: "Security: Static Code Analysis"
    uses: gorgias/reusable-actions/.github/workflows/sast-scans.yml@main
    # Skip any PR created by dependabot to avoid permission issues:
    if: (github.actor != 'dependabot[bot]' )
    secrets: inherit
    with:
      semgrep-fail-on-severity: CRITICAL
      semgrep-fail-on-confidence: HIGH
      exit-zero: false
      pr-mode: ${{ github.ref_name != 'main' }}
      files-to-ignore: "apps/helpdesk/src/assets/ /tests/ __snapshots__"
      split-main-scan: true
      split-pr-scan: true

  security-dependencies:
    uses: gorgias/reusable-actions/.github/workflows/security-dependency-scans.yml@main
    name: "Security: Dependencies"
    # Skip running on dependabot PRs, and on main & staging
    if: (github.actor != 'dependabot[bot]') && (github.ref != 'refs/heads/main') && (github.ref != 'refs/heads/staging')
    secrets: inherit
    with:
      exit-zero: false
      pr-mode: ${{ github.ref_name != 'main' }}

  security-secrets:
    uses: gorgias/reusable-actions/.github/workflows/security-secret-scans.yml@main
    name: "Security: Secrets Scan"
    if: (github.actor != 'dependabot[bot]')
    secrets: inherit
    with:
      exit-zero: false
      pr-mode: ${{ github.ref_name != 'main' }}
