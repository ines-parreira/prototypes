codecov:
  require_ci_to_pass: false
  notify:
    after_n_builds: 8
    wait_for_ci: true

ignore:
  - src/core/layout/panels/helpers/calculateSizes.ts
  - src/pages/automate/workflows/editor/visualBuilder/editors/TestFlowEditor.tsx
  - src/pages/aiAgent/Onboarding/components/OnboardingDevPreview/OnboardingDevPreview.tsx
  - src/pages/common/components/infobar/InfobarLayout.tsx
  - src/assets/js/pubnub.worker.*.js
  - src/settings/**/*
  - src/pages/automate/articleRecommendation/ArticleRecommendationView.tsx
  - src/pages/automate/orderManagement/**/*
  - src/pages/settings/common/SettingsNavbar/config.tsx
  - src/routes/settings/Settings.tsx
  - src/main/init/index.tsx
  - src/pages/settings/helpCenter/utils/algolia.ts
  - src/pages/common/hooks/useAutoScrollOnDragging.ts
  - src/pages/tickets/navbar/TicketNavbarV2.tsx
  - src/pages/tickets/navbar/v2/TicketNavbarSectionV2.tsx
  - src/pages/tickets/navbar/v2/TicketNavbarViewLinkV2.tsx
  - src/routes/Routes.tsx

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
        if_ci_failed: error
        branches:
          - '!revert*'
          - '!revert-*'

    patch:
      default:
        target: 80%
        threshold: 0.5%
        if_ci_failed: error
        branches:
          - '!revert*'
          - '!revert-*'
