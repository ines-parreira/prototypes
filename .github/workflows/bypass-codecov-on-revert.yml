name: Bypass Codecov on revert

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bypass-codecov-on-revert:
    runs-on: gh-actions-small-runner-set
    permissions:
      statuses: write

    steps:
      - name: Check if the source branch is a revert branch
        id: check_revert_branch
        run: |
          if [[ "${{ github.head_ref }}" == revert/* || "${{ github.head_ref }}" == revert-* ]]; then
            echo "IsRevert=true" >> $GITHUB_ENV
          else
            echo "IsRevert=false" >> $GITHUB_ENV
          fi

      - name: Set Codecov status checks to success if revert branch
        if: env.IsRevert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Set codecov/patch status check to success
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'codecov/patch',
              description: 'Revert branch detected, skipping check.'
            });
            
            // Set codecov/project status check to success
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'codecov/project',
              description: 'Revert branch detected, skipping check.'
            });
