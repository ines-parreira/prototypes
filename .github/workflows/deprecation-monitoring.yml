name: Deprecation Monitoring

on:
  schedule:
    # Run every Friday at 1pm UTC
    - cron: '0 13 * * 5'
  workflow_dispatch: # Allow manual triggering

jobs:
  deprecation-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        id: install-dependencies
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}
          npm-token: ${{ secrets.GH_READ_PACKAGES_TOKEN }}

      - name: Run deprecation analysis
        run: pnpm platform:deprecated-analysis

      - name: Check if results changed
        id: check-changes
        run: |
          if git diff --quiet scripts/deprecated-monitoring/deprecated.snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in deprecation analysis results"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in deprecation analysis results"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update deprecation analysis results"
          title: "🤖 Update deprecation analysis results"
          body: |
            ## Deprecation Analysis Update
            
            This PR updates the deprecation analysis results based on the latest codebase scan.
            
            ### What changed?
            - Updated deprecation analysis snapshot
            - Generated on: ${{ github.event.schedule || 'Manual trigger' }}
            
            ### Next steps
            Please review the changes in `scripts/deprecated-monitoring/deprecated.snapshot.json` to understand what deprecated code usage has changed.
            
            ---
            *This PR was automatically generated by the deprecation monitoring workflow.*
          branch: deprecation-analysis-update
          committer: "Nicolas Toulemont <nicolastoulemont@gorgias.com>"
          delete-branch: true
          labels: |
            automated
            deprecation
            maintenance
