include:
  - project: 'gorgias/gorgias-ops'
    ref: main
    file: /.gitlab/ci/common.gitlab-ci.yml

stages:
  - bootstrap
  - test
  - build
  - deploy
  - release
  - docs
  - force deploy

.node_modules-cache: &node_modules-cache
  key:
    files:
      - yarn.lock
      - 'patches/*'
  paths:
    - node_modules
  policy: pull

default:
  image: node:18
  tags:
    - non-gpu
  timeout: 30m
  retry:
    max: 2
    when:
      - runner_system_failure

variables:
  BUILD_DIR: 'build'
  ASSETS_DIR: 'src/assets'
  STORAGE_PATH: 'web-app'
  WEB_APP_RELEASE: '$CI_COMMIT_SHORT_SHA'

.staging_env:
  variables:
    GCLOUD_PROJECT: gorgias-helpdesk-staging
    STORAGE_BUCKET: gs://gorgias-assets-staging
    DEPLOY_ENV: staging
  rules:
    - if: $CI_COMMIT_REF_NAME == "staging"

.production_env:
  variables:
    GCLOUD_PROJECT: gorgias-helpdesk-production
    STORAGE_BUCKET: gs://gorgias-assets-production
    DEPLOY_ENV: production
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"

# This keyword only works on a job, cannot be extended
.gitlab_environment: &gitlab_environment
  environment:
    name: ${DEPLOY_ENV}/${CONTEXT}

.codecov:
  after_script:
    - |
      cat ./codecov_pgp_key.asc | gpg --no-default-keyring --keyring trustedb.gpg --import
      curl -Os https://uploader.codecov.io/latest/linux/codecov
      curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM
      curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM.sig
      gpg --keyring ~/.gnupg/trustedb.gpg --verify codecov.SHA256SUM.sig codecov.SHA256SUM
      shasum -a 256 -c codecov.SHA256SUM
      chmod +x codecov
      ./codecov -t ${CODECOV_TOKEN}

Install dependencies:
  stage: bootstrap
  script:
    - |
      if [[ -d node_modules ]]; then
        exit 10
      fi
    # Update npm config to enable yarn to access private GitHub packages.
    - npm set @gorgias:registry https://npm.pkg.github.com/
    - npm set //npm.pkg.github.com/:_authToken $GITHUB_READ_PACKAGES_TOKEN
    - yarn install --frozen-lockfile
  cache:
    - <<: *node_modules-cache
      policy: pull-push
  allow_failure:
    exit_codes: 10 # do not install if cache exists

Lint:
  stage: test
  script:
    - yarn lint
  cache:
    - <<: *node_modules-cache

Typecheck:
  stage: test
  script:
    - yarn types
  cache:
    - <<: *node_modules-cache

Jest:
  extends:
    - .codecov
  stage: test
  variables:
    NODE_OPTIONS: '--max-old-space-size=3072'
    COVERAGE_DIR: ${CI_PROJECT_DIR}/coverage/
    CACHE_FALLBACK_KEY: ${CI_JOB_NAME}-${CI_DEFAULT_BRANCH}-non_protected
    JUNIT_PATH: ${CI_PROJECT_DIR}/junit.xml
  artifacts:
    paths:
      - coverage/
    reports:
      junit: $JUNIT_PATH
  parallel: 8
  script:
    - yarn test:ci:cover --shard "$CI_NODE_INDEX/$CI_NODE_TOTAL"
  cache:
    - <<: *node_modules-cache
    - key: '$CI_JOB_NAME-$CI_COMMIT_REF_SLUG'
      paths:
        - src/.cache/jest
      unprotect: true

.build:
  stage: build
  script:
    - yarn build
  artifacts:
    paths:
      - build/
  cache:
    - <<: *node_modules-cache

Build preview:
  extends: .build
  needs: [Install dependencies]
  variables:
    GORGIAS_ASSETS_URL: https://gorgias-assets.gorgias.xyz/preview/${CI_COMMIT_SHA}/${STORAGE_PATH}
  rules:
    - if: $CI_COMMIT_REF_NAME != "main" && $CI_COMMIT_REF_NAME != "staging"

Build staging:
  extends: .build
  needs: [Install dependencies]
  variables:
    GORGIAS_ASSETS_URL: https://gorgias-assets.gorgias.xyz/${STORAGE_PATH}
  rules:
    - if: $CI_COMMIT_REF_NAME == "staging"

Build production:
  extends: .build
  needs: [Install dependencies]
  variables:
    GORGIAS_ASSETS_URL: https://gorgias-assets.gorgias.io/${STORAGE_PATH}
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "staging"

.deploy:
  stage: deploy
  extends: [.deploy common]
  before_script:
    - gcloud auth activate-service-account $GCLOUD_SERVICE_ACCOUNT --key-file=${GCLOUD_SERVICE_KEY_FILE} --project=${GCLOUD_PROJECT}
    - export GOOGLE_APPLICATION_CREDENTIALS=${GCLOUD_SERVICE_KEY_FILE}
  script:
    - . deployment/bin/deploy-utils.sh
    - . deploy-argo-utils.sh
    - find_and_publish_to_gcs $BUILD_DIR ${STORAGE_BUCKET}/${STORAGE_PATH}/build
    - find_and_publish_to_gcs $ASSETS_DIR ${STORAGE_BUCKET}/${STORAGE_PATH}/assets
    - setup_helpdesk_kubecontext $CONTEXT
    - publish_manifest_configmap $CONTEXT default $BUILD_DIR /${STORAGE_PATH}/build

.deploy staging:
  dependencies: [Build staging]
  extends:
    - .deploy
    - .staging_env

Deploy staging:
  extends: .deploy staging
  variables:
    CONTEXT: gorgias-helpdesk-staging-us-east1-86cc
  <<: *gitlab_environment

.deploy production:
  dependencies: [Build production]
  extends:
    - .deploy
    - .production_env

Deploy production:
  extends: .deploy production
  parallel:
    matrix:
      - CONTEXT:
          - gorgias-helpdesk-production-aus-southeast1-fcb9
          - gorgias-helpdesk-production-europe-west1-c511
          - gorgias-helpdesk-production-europe-west3-86c1
          - gorgias-helpdesk-production-us-central1-c433
          - gorgias-helpdesk-production-us-central1-d8ff
          - gorgias-helpdesk-production-us-east1-2607
          - gorgias-helpdesk-production-us-east4-5f09
          - gorgias-helpdesk-production-us-east4-65cd
          - gorgias-helpdesk-production-us-east1-c94b
          - gorgias-main-us-east1-635c
  <<: *gitlab_environment

Deploy preview:
  extends:
    - .deploy
    - .staging_env
  dependencies: [Build preview]
  when: manual
  allow_failure: true
  rules:
    - if: $CI_COMMIT_REF_NAME != "main" && $CI_COMMIT_REF_NAME != "staging"
  variables:
    BACKEND_REF: main
  script:
    - deployment/bin/deploy-preview.sh $CI_COMMIT_SHA

.sentry release:
  stage: release
  script:
    - yarn sentry-cli releases new "$WEB_APP_RELEASE"
    - yarn sentry-cli releases set-commits "$WEB_APP_RELEASE" --auto --ignore-missing
    - yarn sentry-cli releases files "$WEB_APP_RELEASE" upload-sourcemaps "$BUILD_DIR"
    - yarn sentry-cli releases finalize "$WEB_APP_RELEASE"
  cache:
    - <<: *node_modules-cache

Create preview release:
  extends: .sentry release
  needs:
    - Build preview
    - Deploy preview
  dependencies: [Build preview]
  rules:
    - if: $CI_COMMIT_REF_NAME != "main" && $CI_COMMIT_REF_NAME != "staging"
  variables:
    SENTRY_PROJECT: 'helpdesk-staging'

Create staging release:
  extends: .sentry release
  dependencies: [Build staging]
  rules:
    - if: $CI_COMMIT_REF_NAME == "staging"
  variables:
    SENTRY_PROJECT: 'helpdesk-staging'

Create production release:
  extends: .sentry release
  dependencies: [Build production]
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
  variables:
    SENTRY_PROJECT: 'helpdesk-web-app'

Publish Chromatic:
  stage: docs
  dependencies: [Install dependencies]
  needs: [Install dependencies]
  allow_failure: true
  script:
    - yarn chromatic --zip --exit-once-uploaded --project-token=${CHROMATIC_PROJECT_TOKEN}
  cache:
    - <<: *node_modules-cache

Force deploy production:
  extends: .deploy production
  stage: force deploy
  when: manual
  variables:
    CONTEXTS: >-
      gorgias-helpdesk-production-us-east1-2607
      gorgias-helpdesk-production-us-east4-65cd
      gorgias-helpdesk-production-us-east4-5f09
      gorgias-helpdesk-production-us-central1-c433
      gorgias-helpdesk-production-us-central1-d8ff
      gorgias-helpdesk-production-europe-west1-c511
      gorgias-helpdesk-production-europe-west3-86c1
      gorgias-helpdesk-production-aus-southeast1-fcb9
      gorgias-main-us-east1-635c
  rules:
    - if: $CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "staging"
  script:
    - . deployment/bin/deploy-utils.sh
    - . deploy-argo-utils.sh
    - find_and_publish_to_gcs $BUILD_DIR ${STORAGE_BUCKET}/${STORAGE_PATH}/build
    - find_and_publish_to_gcs $ASSETS_DIR ${STORAGE_BUCKET}/${STORAGE_PATH}/assets
    - |
      for CONTEXT in $CONTEXTS; do
        setup_helpdesk_kubecontext $CONTEXT
        publish_manifest_configmap $CONTEXT default $BUILD_DIR /${STORAGE_PATH}/build
      done
