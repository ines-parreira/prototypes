name: Deprecation Monitoring

on:
  schedule:
    # Run every Friday at 1pm UTC
    - cron: "0 13 * * 5"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  deprecation-analysis:
    name: Deprecation analysis
    runs-on: gh-actions-small-runner-set
    outputs:
      changed: ${{ steps.check-changes.outputs.changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_BOT_FRONTEND_PKG_WRITE_TOKEN }}

      - name: Install node
        uses: gorgias/reusable-actions/.github/actions/setup-node@main
        with:
          node-version: "22"

      - name: Set GitHub Packages auth token
        shell: bash
        run: |
          echo '@gorgias:registry=https://npm.pkg.github.com/' >> .npmrc
          echo '//npm.pkg.github.com/:_authToken=${{ secrets.GH_READ_PACKAGES_TOKEN }}' >> .npmrc

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Run deprecation analysis
        run: pnpm platform:deprecated-analysis

      - name: Check if results changed
        id: check-changes
        run: |
          if git diff --quiet scripts/deprecated-monitoring/deprecated.snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in deprecation analysis results"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in deprecation analysis results"
          fi

      - id: set-date-token
        name: Set date
        if: steps.check-changes.outputs.changed == 'true'
        run: echo "date-token=$(date +'%m-%d')" >> "$GITHUB_OUTPUT"

      - id: setup-git
        name: Setup git
        if: steps.check-changes.outputs.changed == 'true'
        env:
          SIGNING_KEY_PUBLIC: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PUBLIC }}
          SIGNING_KEY_PRIVATE: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PRIVATE }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SIGNING_KEY_PRIVATE\n" > "$HOME/.ssh/signing-key"
          echo "$SIGNING_KEY_PUBLIC\n" > "$HOME/.ssh/signing-key.pub"
          chmod 600 "$HOME/.ssh/signing-key"
          chmod 600 "$HOME/.ssh/signing-key.pub"
          git config --global --add safe.directory $(pwd)
          git config --global user.name "gorgias-bot-frontend"
          git config --global user.email "engineering-sre+frontend@gorgias.com"
          git config --global user.signingkey "$HOME/.ssh/signing-key.pub"
          git config --global commit.gpgsign true
          git config --global gpg.format ssh

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        shell: bash
        env:
          SIGNING_KEY_PUBLIC: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PUBLIC }}
          SIGNING_KEY_PRIVATE: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PRIVATE }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SIGNING_KEY_PRIVATE\n" > "$HOME/.ssh/signing-key"
          echo "$SIGNING_KEY_PUBLIC\n" > "$HOME/.ssh/signing-key.pub"
          chmod 600 "$HOME/.ssh/signing-key"
          chmod 600 "$HOME/.ssh/signing-key.pub"
          git config --global --add safe.directory $(pwd)
          git config --global user.name "gorgias-bot-frontend"
          git config --global user.email "engineering-sre+frontend@gorgias.com"
          git config --global user.signingkey "$HOME/.ssh/signing-key.pub"
          git config --global commit.gpgsign true
          git config --global gpg.format ssh
          git checkout -b update-deprecated-monitoring-snapshot-${{ steps.set-date-token.outputs.date-token }}
          git add scripts/deprecated-monitoring/deprecated.snapshot.json
          git commit -m "chore(deprecated-monitoring): update deprecated monitoring snapshot ${{ steps.set-date-token.outputs.date-token }}"
          git push --force --set-upstream origin update-deprecated-monitoring-snapshot-${{ steps.set-date-token.outputs.date-token }}

      - name: Open PR
        if: steps.check-changes.outputs.changed == 'true'
        uses: gorgias/reusable-actions/.github/actions/open-pr@main
        env:
          SIGNING_KEY_PUBLIC: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PUBLIC }}
          SIGNING_KEY_PRIVATE: ${{ secrets.GORGIAS_BOT_FRONTEND_SIGNING_KEY_PRIVATE }}
        with:
          github-token: ${{ secrets.GH_BOT_FRONTEND_PKG_WRITE_TOKEN }}
          repo: ${{ github.repository }}
          base: main
          head: update-deprecated-monitoring-snapshot-${{ steps.set-date-token.outputs.date-token }}
          title: "chore(deprecated-monitoring): update deprecated monitoring snapshot ${{ steps.set-date-token.outputs.date-token }}"
          reviewers: "nicolastoulemont"
          body: |
            ### Changes

            #### Bump deprecated monitoring snapshot

            This PR updates the deprecated monitoring snapshot.
