name: Deprecation Monitoring

on:
  schedule:
    # Run every Friday at 1pm UTC
    - cron: '0 13 * * 5'
  workflow_dispatch: # Allow manual triggering

jobs:

  workspace-vars:
    name: Workspace vars
    runs-on: gh-actions-small-runner-set
    outputs:
      node-version: '22'
    steps:
      - name: Workspace vars
        run: echo "empty step"

  install-dependencies:
    name: Install dependencies
    needs: workspace-vars
    runs-on: gh-actions-large-runner-set
    outputs:
      cache-key: ${{ env.CACHE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        id: install-dependencies
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}
          npm-token: ${{ secrets.GH_READ_PACKAGES_TOKEN }}
  deprecation-analysis:
    name: Deprecation analysis
    needs:
      - workspace-vars
      - install-dependencies
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check-changes.outputs.changed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          key: ${{ needs.install-dependencies.outputs.cache-key }}
          path: node_modules

      - name: Install node
        uses: gorgias/reusable-actions/.github/actions/setup-node@main
        with:
          node-version: ${{ needs.workspace-vars.outputs.node-version }}

      - name: Run deprecation analysis
        run: pnpm platform:deprecated-analysis

      - name: Check if results changed
        id: check-changes
        run: |
          if git diff --quiet scripts/deprecated-monitoring/deprecated.snapshot.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in deprecation analysis results"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in deprecation analysis results"
          fi

  create-branch:
    name: Create branch
    needs: deprecation-analysis
    if: needs.deprecation-analysis.outputs.changed == 'true'
    runs-on: gh-actions-small-runner-set
    outputs:
      branch-name: ${{ steps.create-branch.outputs.branch-name }}
      date-token: ${{ steps.set-date-token.outputs.date-token }}

    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - id: resolve-main-commit
        name: Resolve main commit
        uses: gorgias/reusable-actions/.github/actions/resolve-commit@main
        with:
          github-token: ${{ secrets.GH_BOT_FRONTEND_PKG_WRITE_TOKEN }}
          repo: ${{ github.repository }}
          ref: main

      - id: set-date-token
        name: Set date
        run: echo "date-token=$(date +'%m-%d')" >> "$GITHUB_OUTPUT"

      - id: create-branch
        name: Create branch
        uses: gorgias/reusable-actions/.github/actions/create-branch@main
        with:
          github-token: ${{ secrets.GH_BOT_FRONTEND_PKG_WRITE_TOKEN }}
          sha: ${{ steps.resolve-main-commit.outputs.sha }}
          repo: ${{ github.repository }}
          branch-name: update-deprecated-monitoring-snapshot-${{ steps.set-date-token.outputs.date-token }}


  open-pr:
    name: Open PR
    runs-on: gh-actions-small-runner-set
    needs:
      - deprecation-analysis
      - create-branch
    if: needs.deprecation-analysis.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - name: Open PR
        uses: gorgias/reusable-actions/.github/actions/open-pr@main
        with:
          github-token: ${{ secrets.GH_BOT_FRONTEND_PKG_WRITE_TOKEN }}
          repo: ${{ github.repository }}
          base: main
          head: ${{ needs.create-branch.outputs.branch-name }}
          title: 'chore(deprecated-monitoring): update deprecated monitoring snapshot ${{ needs.create-branch.outputs.date-token }}'
          body: |
            ### Changes

            #### Bump deprecated monitoring snapshot

            This PR updates the deprecated monitoring snapshot.